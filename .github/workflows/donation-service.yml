name: CI/CD - donation-service

on:
  push:
    branches: [main]
    paths:
      - "donation-service/**"
      - ".github/workflows/donation-service.yml"
  pull_request:
    paths:
      - "donation-service/**"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: solidarytech/donation-service
  SERVICE_DIR: donation-service

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go vet
        run: cd ${{ env.SERVICE_DIR }} && go vet ./...

      - name: Trivy - Scan filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./${{ env.SERVICE_DIR }}"
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-fs.sarif"

  build-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tags=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build -t ${{ steps.meta.outputs.tags }} ./${{ env.SERVICE_DIR }}

      - name: Trivy - Scan container image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Push to ECR
        run: docker push ${{ steps.meta.outputs.tags }}

      - name: Update image tag in k8s manifests
        run: |
          sed -i "s|solidarytech/donation-service:.*|solidarytech/donation-service:${{ github.sha }}|g" \
            k8s/base/donation-service/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/donation-service/deployment.yaml
          git commit -m "ci: update donation-service image to ${{ github.sha }}" || echo "No changes"
          git push
