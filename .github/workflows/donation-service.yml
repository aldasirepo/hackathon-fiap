name: CI/CD - donation-service

on:
  push:
    branches: [main]
    paths:
      - "donation-service/**"
      - ".github/workflows/donation-service.yml"
  pull_request:
    paths:
      - "donation-service/**"

permissions:
  contents: write
  security-events: write
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: solidarytech/donation-service
  SERVICE_DIR: donation-service

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - Scan filesystem (SCA/SAST)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./donation-service"
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-fs.sarif"

  build-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        run: |
          IMAGE="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          docker build -t "$IMAGE" ./${{ env.SERVICE_DIR }}
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Update kustomize overlay
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Retry loop para evitar conflito quando multiplos workflows rodam em paralelo
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cd k8s/overlays/production
            kustomize edit set image \
              "solidarytech/donation-service=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
            cd $GITHUB_WORKSPACE
            git add k8s/overlays/production/kustomization.yaml
            git commit -m "ci: update donation-service to ${{ github.sha }}" || { echo "No changes"; exit 0; }
            git push origin main && break || sleep $((i * 5))
          done
