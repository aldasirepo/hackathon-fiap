apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-solidarytech
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
          continue: true
        - match:
            slo: error-rate
          receiver: 'slo-alerts'

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://alertmanager-webhook:5001/'

      - name: 'pagerduty-critical'
        pagerduty_configs:
          - routing_key: '${PAGERDUTY_INTEGRATION_KEY}'
            description: '{{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}'

      - name: 'slo-alerts'
        slack_configs:
          - api_url: '${SLACK_WEBHOOK_URL}'
            channel: '#sre-solidarytech'
            title: 'SLO Alert: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
